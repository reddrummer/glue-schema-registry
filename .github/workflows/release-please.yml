on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: write
  pull-requests: write

name: release-please

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
    steps:
      - uses: google-github-actions/release-please-action@v3
        id: release
        with:
          release-type: node
          package-name: release-please-action

  # Publish to AWS CodeArtifact — only when release-please cut a release.
  publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
      - run: npm ci
      - run: npm run build
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_PUBLISH_ROLE_ARN }}
          aws-region: us-east-1
      - name: Authenticate to CodeArtifact and publish
        run: |
          CODEARTIFACT_TOKEN=$(aws codeartifact get-authorization-token \
            --domain drumwave-prod \
            --domain-owner 127266044500 \
            --query authorizationToken \
            --output text)
          REGISTRY_URL=$(aws codeartifact get-repository-endpoint \
            --domain drumwave-prod \
            --domain-owner 127266044500 \
            --repository common-library-npm \
            --format npm \
            --query repositoryEndpoint \
            --output text)
          echo "${REGISTRY_URL#https:}:_authToken=${CODEARTIFACT_TOKEN}" >> .npmrc
          echo "registry=${REGISTRY_URL}" >> .npmrc
          npm publish
